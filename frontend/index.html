<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundry-Hub – KI-Agentur</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />
  <meta name="theme-color" content="#3b82f6" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo"><svg viewBox="0 0 64 64" width="22" height="22" aria-hidden="true">
          <g stroke="currentColor" stroke-width="3.4" stroke-linecap="round" opacity="0.95" fill="none">
            <line x1="32" y1="32" x2="32" y2="16"/><line x1="32" y1="32" x2="17" y2="44"/><line x1="32" y1="32" x2="47" y2="44"/>
          </g>
          <g fill="currentColor"><circle cx="32" cy="15" r="5.4"/><circle cx="16" cy="45" r="5.4"/><circle cx="48" cy="45" r="5.4"/></g>
          <path d="M32 23.4 L39.4 27.7 L39.4 36.3 L32 40.6 L24.6 36.3 L24.6 27.7 Z" fill="currentColor"/>
          <circle cx="32" cy="32" r="3.1" fill="#5566ee"/>
        </svg></div>
        <div><b>Foundry-Hub</b><small>Deine KI-Agentur</small></div>
      </div>
      <div class="nav-item active" data-view="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</div>
      <div class="nav-item" data-view="inbox"><i data-lucide="inbox"></i> Inbox <span class="badge hidden" id="badge-inbox">0</span></div>
      <div class="nav-item" data-view="assistant"><i data-lucide="sparkles"></i> Assistent</div>
      <div class="nav-item" data-view="projects"><i data-lucide="folder-kanban"></i> Projekte</div>
      <div class="nav-item" data-view="progress"><i data-lucide="gauge"></i> Fortschritt</div>
      <div class="nav-item" data-view="org"><i data-lucide="network"></i> Team / Org</div>
      <div class="nav-item" data-view="tasks"><i data-lucide="list-checks"></i> Aufgaben</div>
      <div class="nav-item" data-view="workshop"><i data-lucide="folder-code"></i> Werkstatt</div>
      <div class="nav-item" data-view="cookbook"><i data-lucide="book-open"></i> Cookbook</div>
      <div class="nav-item" data-view="knowledge"><i data-lucide="brain"></i> Wissen</div>
      <div class="nav-item" data-view="skills"><i data-lucide="puzzle"></i> Skills & MCP</div>
      <div class="nav-item" data-view="approvals"><i data-lucide="shield-check"></i> Freigaben <span class="badge warn hidden" id="badge-approvals">0</span></div>
      <div class="nav-item" data-view="activity"><i data-lucide="activity"></i> Aktivität</div>
      <div class="nav-item hidden" data-view="users" id="nav-users"><i data-lucide="users"></i> Nutzer & Teilen</div>
      <div class="nav-item" data-view="settings"><i data-lucide="settings"></i> Einstellungen</div>
      <div class="sidebar-foot">
        <div class="toggle" id="theme-toggle"><i data-lucide="moon"></i><span>Theme</span></div>
      </div>
    </aside>
    <div class="backdrop" id="nav-backdrop"></div>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="Menü"><i data-lucide="menu"></i></button>
        <h1 id="view-title">Dashboard</h1>
        <div class="spacer"></div>
        <div id="gsearch-wrap" style="position:relative">
          <input id="gsearch" placeholder="Suchen … (Projekte, Aufgaben, Wissen)" autocomplete="off"
                 style="width:280px;margin:0;padding:6px 10px"/>
          <div id="gsearch-results" class="hidden"></div>
        </div>
        <select id="tenant-switch" class="hidden" style="width:auto;margin:0;padding:5px 9px"></select>
        <span class="muted hidden" id="user-label"></span>
        <button class="btn ghost sm hidden" id="logout-btn"><i data-lucide="log-out"></i></button>
        <span class="status-dot" id="run-dot"></span>
        <span class="muted" id="run-label">läuft</span>
      </div>
      <div id="view-root"></div>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
