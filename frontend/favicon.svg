      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#fhbg)"/>
  <!-- Verbindungen (Hub-Speichen) -->
  <g stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" opacity="0.95">
    <line x1="32" y1="32" x2="32" y2="16"/>
    <line x1="32" y1="32" x2="17" y2="44"/>
    <line x1="32" y1="32" x2="47" y2="44"/>
