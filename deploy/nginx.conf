# AI-Hub hinter nginx mit HTTPS (Reverse Proxy).
# Zertifikate z. B. via certbot/Let's Encrypt nach /etc/letsencrypt mounten.

server {
    listen 80;
    server_name _;
    # HTTP -> HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name deine-domain.de;

    ssl_certificate     /etc/letsencrypt/live/deine-domain.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deine-domain.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # max. Upload-Größe (für Datei-Uploads)
    client_max_body_size 50m;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # wichtig: meldet https an die App
        proxy_read_timeout 600s;
    }
}
