# Zusatz für HTTPS-Betrieb: docker compose -f docker-compose.yml -f deploy/docker-compose.tls.yml up -d
# Stellt einen nginx-Reverse-Proxy mit TLS vor die App. App-Port wird NICHT mehr
# direkt veröffentlicht – nur noch nginx (80/443).
services:
  app:
    ports: []          # App nicht mehr direkt nach außen
    environment:
      - FORWARDED_ALLOW_IPS=*    # uvicorn vertraut den X-Forwarded-* des Proxys

  nginx:
    image: nginx:alpine
    container_name: foundryhub-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped
