services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aihub-app
    ports:
      - "8000:8000"
    environment:
      # Standard: SQLite. FÃ¼r Postgres das Profil "postgres" starten und hier
      # z. B. DATABASE_URL=postgresql+psycopg://aihub:aihub@postgres:5432/aihub setzen.
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/aihub.db}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SLACK_WEBHOOK=${SLACK_WEBHOOK:-}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-}
      - IP_ALLOWLIST=${IP_ALLOWLIST:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-true}
      - IMAP_HOST=${IMAP_HOST:-}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER:-}
      - IMAP_PASS=${IMAP_PASS:-}
      - IMAP_SSL=${IMAP_SSL:-true}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_AUTO_MODEL=${OLLAMA_AUTO_MODEL:-llama3.2:1b}
      - DEFAULT_CHEF_PROVIDER=${DEFAULT_CHEF_PROVIDER:-claude}
      - DEFAULT_CHEF_MODEL=${DEFAULT_CHEF_MODEL:-claude-opus-4-8}
      - DEFAULT_WORKER_PROVIDER=${DEFAULT_WORKER_PROVIDER:-claude}
      - DEFAULT_WORKER_MODEL=${DEFAULT_WORKER_MODEL:-claude-sonnet-4-6}
      - ALLOW_MOCK_FALLBACK=${ALLOW_MOCK_FALLBACK:-true}
      - ENABLE_CODE_EXECUTION=${ENABLE_CODE_EXECUTION:-true}
      - EXEC_TIMEOUT=${EXEC_TIMEOUT:-60}
      - WORKSPACE_DIR=/data/workspace
      - SANDBOX_URL=${SANDBOX_URL:-http://sandbox:8800}
      - OBSIDIAN_VAULT=${OBSIDIAN_VAULT:-/data/vault}
    volumes:
      - aihub-data:/data
      # FÃ¼r Obsidian: hier deinen Vault-Ordner einhÃ¤ngen, z. B.:
      #   - /pfad/zu/deinem/Obsidian-Vault:/data/vault
      - aihub-vault:/data/vault
    depends_on:
      - ollama
      - sandbox
    restart: unless-stopped

  # Isolierter Build-Container: hier installieren/bauen die Agenten (getrennt
  # vom App-Container). Teilt sich das Workspace-Volume mit der App.
  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    container_name: aihub-sandbox
    environment:
      - WORKSPACE_DIR=/data/workspace
    ports:
      - "8090:8090"   # Live-Vorschau (Dev-Server der Projekte)
    volumes:
      - aihub-data:/data
    restart: unless-stopped

  # PostgreSQL (optional). Nur mit Profil starten:
  #   docker compose --profile postgres up -d
  # und in der App DATABASE_URL passend setzen (siehe oben).
  postgres:
    image: postgres:16-alpine
    container_name: aihub-postgres
    profiles: ["postgres"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-aihub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aihub}
      - POSTGRES_DB=${POSTGRES_DB:-aihub}
    volumes:
      - aihub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aihub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Lokale Modelle (optional). Modelle vorher ziehen, z. B.:
  #   docker exec -it aihub-ollama ollama pull llama3.1
  ollama:
    image: ollama/ollama:latest
    container_name: aihub-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  aihub-data:
  aihub-vault:
  ollama-data:
  aihub-pgdata:
