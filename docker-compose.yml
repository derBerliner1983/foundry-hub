services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: foundryhub-app
    ports:
      - "8000:8000"
    environment:
      # Standard: SQLite. Für Postgres das Profil "postgres" starten und hier
      # z. B. DATABASE_URL=postgresql+psycopg://foundryhub:foundryhub@postgres:5432/foundryhub setzen.
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/foundryhub.db}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SLACK_WEBHOOK=${SLACK_WEBHOOK:-}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-}
      - IP_ALLOWLIST=${IP_ALLOWLIST:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-true}
      - IMAP_HOST=${IMAP_HOST:-}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USER=${IMAP_USER:-}
      - IMAP_PASS=${IMAP_PASS:-}
      - IMAP_SSL=${IMAP_SSL:-true}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL:-}
      # Ollama: Standard zeigt auf eine bereits vorhandene Instanz auf dem Host
      # (host.docker.internal). Wer den mitgelieferten Ollama-Container nutzt
      # (Profil "ollama"), setzt in der .env OLLAMA_BASE_URL=http://ollama:11434.
      # Lässt sich auch jederzeit in der GUI ändern.
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_AUTO_MODEL=${OLLAMA_AUTO_MODEL:-}
      - DEFAULT_CHEF_PROVIDER=${DEFAULT_CHEF_PROVIDER:-claude}
      - DEFAULT_CHEF_MODEL=${DEFAULT_CHEF_MODEL:-claude-opus-4-8}
      - DEFAULT_WORKER_PROVIDER=${DEFAULT_WORKER_PROVIDER:-claude}
      - DEFAULT_WORKER_MODEL=${DEFAULT_WORKER_MODEL:-claude-sonnet-4-6}
      - ALLOW_MOCK_FALLBACK=${ALLOW_MOCK_FALLBACK:-true}
      - ENABLE_CODE_EXECUTION=${ENABLE_CODE_EXECUTION:-true}
      - EXEC_TIMEOUT=${EXEC_TIMEOUT:-60}
      - WORKSPACE_DIR=/data/workspace
      - SANDBOX_URL=${SANDBOX_URL:-http://sandbox:8800}
      - OBSIDIAN_VAULT=${OBSIDIAN_VAULT:-/data/vault}
    volumes:
      - foundryhub-data:/data
      # Für Obsidian: hier deinen Vault-Ordner einhängen, z. B.:
      #   - /pfad/zu/deinem/Obsidian-Vault:/data/vault
      - foundryhub-vault:/data/vault
    extra_hosts:
      # erlaubt dem Container, eine auf dem Host laufende Ollama-Instanz zu erreichen
      - "host.docker.internal:host-gateway"
    depends_on:
      - sandbox
    restart: unless-stopped

  # Isolierter Build-Container: hier installieren/bauen die Agenten (getrennt
  # vom App-Container). Teilt sich das Workspace-Volume mit der App.
  sandbox:
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    container_name: foundryhub-sandbox
    environment:
      - WORKSPACE_DIR=/data/workspace
    ports:
      - "8090:8090"   # Live-Vorschau (Dev-Server der Projekte)
    volumes:
      - foundryhub-data:/data
    restart: unless-stopped

  # PostgreSQL (optional). Nur mit Profil starten:
  #   docker compose --profile postgres up -d
  # und in der App DATABASE_URL passend setzen (siehe oben).
  postgres:
    image: postgres:16-alpine
    container_name: foundryhub-postgres
    profiles: ["postgres"]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-foundryhub}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-foundryhub}
      - POSTGRES_DB=${POSTGRES_DB:-foundryhub}
    volumes:
      - foundryhub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foundryhub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Lokale Modelle (OPTIONAL und standardmäßig AUS).
  # Nur starten, wenn du KEIN eigenes Ollama auf dem Host hast:
  #   docker compose --profile ollama up -d
  # Modelle ziehen:  docker exec -it foundryhub-ollama ollama pull llama3.1
  # Hast du bereits Ollama auf dem Host, lass dieses Profil weg – die App
  # erreicht es über host.docker.internal (siehe OLLAMA_BASE_URL oben).
  ollama:
    image: ollama/ollama:latest
    container_name: foundryhub-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  foundryhub-data:
  foundryhub-vault:
  ollama-data:
  foundryhub-pgdata:
